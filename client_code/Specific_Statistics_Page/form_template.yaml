components:
- components:
  - layout_properties: {grid_position: 'MNYAPR,QHLMHB'}
    name: label_1
    properties: {align: center, background: 'theme:Primary Container', bold: true, font: '', font_size: 48, foreground: 'theme:Primary', text: Statistics}
    type: Label
  - layout_properties: {grid_position: 'TLXGKH,HGKSHP'}
    name: Statistics_Redirect2
    properties: {background: 'theme:Primary Container', text: Click here to return to statistics about you!}
    type: Button
  - layout_properties: {grid_position: 'RJMXFI,DBBHBQ'}
    name: label_2
    properties: {text: Select the item you would like to see statistics about.}
