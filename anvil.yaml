allow_embedding: false
db_schema:
  homework:
    client: search
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: Student
      target: users
      type: link_single
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: Work Returned
      type: number
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: Work Overdue
      type: number
    - admin_ui: {order: 3, width: 200}
      client_hidden: false
      name: Work Due Soon
      type: number
    - admin_ui: {order: 4, width: 200}
      client_hidden: false
      name: Work Pending Marks
      type: number
    indexes: []
    server: full
    title: Homework
  users:
    client: search
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: true
      name: enabled
      type: bool
    - admin_ui: {order: 2, width: 200}
      client_hidden: true
      name: last_login
      type: datetime
    - admin_ui: {order: 3, width: 200}
      client_hidden: true
      name: password_hash
      type: string
    - admin_ui: {order: 4, width: 200}
      client_hidden: true
      name: n_password_failures
      type: number
    - admin_ui: {order: 5, width: 200}
      client_hidden: true
      name: confirmed_email
      type: bool
    - admin_ui: {order: 6, width: 200}
      client_hidden: true
      name: signed_up
      type: datetime
    indexes: []
    server: full
    title: Users
dependencies: []
metadata: {description: '', title: BEAM portal}
name: fuckass enterprise project
package_name: fuckass_enterprise_project
renamed: true
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: false, enable_automatically: false, require_secure_passwords: false, use_email: true}
  server_config:
    email_content:
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
startup: {module: LogIn_Page, type: form}
startup_form: null
