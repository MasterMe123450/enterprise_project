dependencies: []
metadata: {description: '', logo_img: 'asset:mcfyicon.jpg', title: BEAM portal}
name: enterprise project
package_name: enterprise_project
renamed: true
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_persist: false
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: true, enable_automatically: false, require_secure_passwords: false, use_email: true}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
startup: {module: LogIn_Page, type: form}
startup_form: null
